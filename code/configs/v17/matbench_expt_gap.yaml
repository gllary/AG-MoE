# matbench_expt_gap - v17 stage1 (composition)

mode: composition
data_file: v13_expt_gap.npz

# -------------------------
# 训练策略
# -------------------------
epochs: 1200
batch_size: 128        # expt_gap 样本数 ~4600，128 是 sweet spot
patience: 300

# -------------------------
# 优化器
# -------------------------
lr: 0.0004             # 比 steels 略小，gap 对 lr 更敏感
weight_decay: 0.0015
loss: huber            # 对实验噪声更鲁棒

# -------------------------
# 模型规模
# -------------------------
embed_dim: 512
dropout: 0.15          # ★ 比 steels 略大，防止过拟合

depth: 4               # 只用于记录（不直接控制结构）
comp_hidden_dims:
  - 512
  - 512
  - 256

# -------------------------
# v17 相关
# -------------------------
use_amp: true          # AMP 对成分任务几乎无性能损失
use_magpie: true       # 标记位，v18 会用
use_deep_encoder: true